name: Coverage

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage
        run: |
          python -m pytest --cov=src --cov-report=xml -q

      - name: Check coverage threshold
        env:
          COVERAGE_THRESHOLD: 80
        run: |
          set -euo pipefail
          COV_FILE=coverage.xml
          if [ ! -f "$COV_FILE" ]; then
            echo "ERROR: $COV_FILE not found at $(pwd)/$COV_FILE"
            ls -la
            exit 1
          fi
          echo "Parsing $COV_FILE..."
          python - <<'PY'
import sys, os, xml.etree.ElementTree as ET
cov_file = os.path.join(os.getcwd(), 'coverage.xml')
try:
    tree = ET.parse(cov_file)
    root = tree.getroot()
    lr = None
    if 'line-rate' in root.attrib:
        lr = float(root.attrib['line-rate'])
    else:
        for elem in root.iter():
            if 'line-rate' in elem.attrib:
                lr = float(elem.attrib['line-rate'])
                break
    if lr is None:
        print("ERROR: 'line-rate' attribute not found in coverage.xml; dumping file for debugging:")
        print(open(cov_file).read())
        sys.exit(1)
    pct = int(round(lr * 100))
    thr = int(os.environ.get('COVERAGE_THRESHOLD', '0'))
    print(f"Coverage: {pct}% (threshold {thr}%)")
    if pct < thr:
        print(f"ERROR: Coverage {pct}% is below threshold {thr}%")
        sys.exit(1)
except ET.ParseError as e:
    print("ERROR: Failed to parse coverage.xml:", e)
    print(open(cov_file).read())
    sys.exit(1)
PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
